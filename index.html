<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BharatStudyAI</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4F9CF9,#6BCB77);
margin:0;
padding:0;
color:#333;
}

.header{
text-align:center;
padding:20px;
background:white;
border-bottom:4px solid #FFD93D;
}

.logo{
font-size:32px;
font-weight:bold;
}

.tag{
color:#666;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:2px solid #eee;
font-size:16px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.ask{background:#4F9CF9;color:white}
.quiz{background:#FFD93D}
.voice{background:#6BCB77;color:white}

.subjects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:20px;
}

.subject{
background:#f5f7ff;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.answer{
margin-top:20px;
padding:15px;
background:#f0fff4;
border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🤖 BharatStudyAI</div>
<div class="tag">Learn Smart for Class 1–5</div>
</div>

<div class="container">
<div class="card">

<select id="class">
<option>Class 1</option>
<option>Class 2</option>
<option>Class 3</option>
<option>Class 4</option>
<option>Class 5</option>
</select>

<select id="subject">
<option>Math</option>
<option>English</option>
<option>Hindi</option>
<option>The World Around Us</option>
<option>Khel & Yoga</option>
<option>Arts</option>
</select>

<select id="lang">
<option>English</option>
<option>Hindi</option>
</select>

<textarea id="question" placeholder="Ask your question..."></textarea>

<div class="buttons">
<button class="voice" onclick="startVoice()">🎤 Speak</button>
<button class="ask" onclick="askAI()">Submit</button>
<button class="quiz" onclick="quiz()">Generate Quiz</button>
</div>

<div id="output" class="answer" style="display:none"></div>

<div class="subjects">
<div class="subject">📘 Math</div>
<div class="subject">📖 English</div>
<div class="subject">📝 Hindi</div>
<div class="subject">🌍 World</div>
<div class="subject">🏃 Khel</div>
<div class="subject">🎨 Arts</div>
</div>

</div>
</div>

<script>
function askAI(){
let q=document.getElementById('question').value.toLowerCase()
let out=document.getElementById('output')

out.style.display='block'
out.innerHTML = solveAI(q)
}

function solveAI(q){

// convert symbols
q=q.replace(/×/g,'*')
q=q.replace(/÷/g,'/')
q=q.replace(/x/g,'*')

/* ----------- BODMAS ----------- */

if(q.includes('+')||q.includes('-')||q.includes('*')||q.includes('/')){
try{
let result = Function('"use strict"; return ('+q+')')()
return "Answer: "+result+"<br><br>BODMAS applied"
}catch{
return "Enter valid math question"
}
}

if(q.includes("bodmas")){
return "BODMAS = Brackets, Orders, Division, Multiplication, Addition, Subtraction"
}

/* ----------- CLASS 4 ENGLISH ----------- */

if(q.includes("wake up")){
return "Wake Up: Wake up, wake up! It's a lovely day. Birds are singing."
}

if(q.includes("neha")){
return "Neha's Alarm Clock: Neha doesn't like waking early. Birds wake her."
}

if(q.includes("noses")){
return "Noses: Some noses are big. Some are small. Noses help us smell."
}

if(q.includes("fir tree")){
return "Little Fir Tree: Tree wanted new leaves. Learned original leaves best."
}

if(q.includes("run")){
return "Run: Run in the sun, run in the rain."
}

if(q.includes("nasruddin")){
return "Nasruddin's Aim: Funny story about arrows."
}

if(q.includes("old english book")){
return "Chapters: Wake Up, Neha Alarm Clock, Noses, Little Fir Tree, Run, Nasruddin"
}

/* -------- SANTOOR CLASS 4 -------- */

/* CHAPTER 1 — TOGETHER WE CAN */

if(q.includes("together we can summary")){
return `
Together We Can – Summary:
Children learn to work together.
They help each other in school and games.
When everyone cooperates, work becomes easy.
The chapter teaches teamwork and unity.
`
}

if(q.includes("together we can keywords")){
return `
Keywords:
Together – working with others  
Teamwork – working as a team  
Help – to assist someone  
Share – to give part to others  
Cooperate – work together peacefully  
`
}

if(q.includes("together we can explain")){
return `
Explanation:
This lesson teaches that we should help each other.
When we work together, we can solve problems easily.
Friends should share, care and cooperate.
Together everyone becomes stronger.
`
}

if(q.includes("together we can question") || q.includes("together we can qa")){
return `
Together We Can – Question Answers

Q1. What do children learn?
Answer: Children learn to work together.

Q2. Why is teamwork important?
Answer: Teamwork makes work easier and faster.

Q3. What should friends do?
Answer: Friends should help and share.

Q4. What is the message of the chapter?
Answer: We should cooperate and help each other.
`
}

if(q.includes("together we can")){
return `
Chapter 1: Together We Can

Ask:
• together we can summary
• together we can keywords
• together we can question
• together we can explain
`
}

if(q.includes("together we can")){
return "Together We Can: Children work together and help each other. Teamwork makes us strong."
}

if(q.includes("tinkling bells")){
return "The Tinkling Bells: Bells ring sweetly. The sound spreads happiness everywhere."
}

if(q.includes("be smart")){
return "Be Smart, Be Safe: Follow safety rules. Be careful while playing and walking."
}

if(q.includes("one thing at a time")){
return "One Thing at a Time: Do one task properly. Do not hurry. Work slowly and neatly."
}

if(q.includes("old stag")){
return "The Old Stag: A stag becomes proud of his horns but learns not to be proud."
}

if(q.includes("braille")){
return "Braille: Blind people read using dots. Braille helps them learn."
}

if(q.includes("fit body")){
return "Fit Body Fit Mind Fit Nation: Exercise keeps body strong and mind active."
}

if(q.includes("lagori")){
return "The Lagori Champions: Children play lagori game. Teamwork helps them win."
}

if(q.includes("hekko")){
return "Hekko: A fun story about friendship and kindness."
}

if(q.includes("swing")){
return "The Swing: Swing high in the sky. It is fun and exciting."
}

if(q.includes("magical mountains")){
return "A Journey to the Magical Mountains: A beautiful journey to mountains full of nature."
}

if(q.includes("maheshwar")){
return "Maheshwar: A historic place near river Narmada. Famous for temples and sarees."
}

if(q.includes("class 4 santoor") || q.includes("class 4 english")){
return `
Class 4 Santoor Chapters:
1. Together We Can
2. The Tinkling Bells
3. Be Smart, Be Safe
4. One Thing at a Time
5. The Old Stag
6. Braille
7. Fit Body, Fit Mind, Fit Nation
8. The Lagori Champions
9. Hekko
10. The Swing
11. A Journey to the Magical Mountains
12. Maheshwar
`
}
  
return "Try: 2+2 or wake up or neha or bodmas"
}

function quiz(){
let out=document.getElementById('output')
out.style.display='block'
out.innerHTML="Quiz:<br>1)2+3×4=?<br>2)Who is Neha?<br>3)What do noses do?"
}

function startVoice(){
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang='en-IN';

recognition.onresult=function(e){
document.getElementById('question').value=e.results[0][0].transcript;
}

recognition.start();
}
</script>

</body>
</html>
