<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BharatStudyAI</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4F9CF9,#6BCB77);
margin:0;
padding:0;
color:#333;
}

.header{
text-align:center;
padding:20px;
background:white;
border-bottom:4px solid #FFD93D;
}

.logo{
font-size:32px;
font-weight:bold;
}

.tag{
color:#666;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:2px solid #eee;
font-size:16px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.ask{background:#4F9CF9;color:white}
.quiz{background:#FFD93D}
.voice{background:#6BCB77;color:white}

.subjects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:20px;
}

.subject{
background:#f5f7ff;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.answer{
margin-top:20px;
padding:15px;
background:#f0fff4;
border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🤖 BharatStudyAI</div>
<div class="tag">Learn Smart for Class 1–5</div>
</div>

<div class="container">
<div class="card">

<select id="class">
<option>Class 1</option>
<option>Class 2</option>
<option>Class 3</option>
<option>Class 4</option>
<option>Class 5</option>
</select>

<select id="subject">
<option>Math</option>
<option>English</option>
<option>Hindi</option>
<option>The World Around Us</option>
<option>Khel & Yoga</option>
<option>Arts</option>
</select>

<select id="lang">
<option>English</option>
<option>Hindi</option>
</select>

<textarea id="question" placeholder="Ask your question..."></textarea>

<div class="buttons">
<button class="voice" onclick="startVoice()">🎤 Speak</button>
<button class="ask" onclick="askAI()">Submit</button>
<button class="quiz" onclick="quiz()">Generate Quiz</button>
</div>

<div id="output" class="answer" style="display:none"></div>

<div class="subjects">
<div class="subject">📘 Math</div>
<div class="subject">📖 English</div>
<div class="subject">📝 Hindi</div>
<div class="subject">🌍 World</div>
<div class="subject">🏃 Khel</div>
<div class="subject">🎨 Arts</div>
</div>

</div>
</div>

<script>
async function askAI(){
let q=document.getElementById('question').value.toLowerCase()
let out=document.getElementById('output')

out.style.display='block'
out.innerHTML="AI is thinking..."

setTimeout(()=>{
out.innerHTML = solveBodmas(q)
},500)

}

function solveBodmas(q){

// replace symbols
q = q.replace(/×/g,'*')
q = q.replace(/÷/g,'/')
q = q.replace(/x/g,'*')

// BODMAS math detection
if(q.includes('+') || q.includes('-') || q.includes('*') || q.includes('/')){
try{
let result = Function('"use strict"; return ('+q+')')()
return "Answer: " + result + "<br><br>Rule: BODMAS → Brackets, Orders, Divide, Multiply, Add, Subtract"
}catch{
return "Please enter valid math question"
}
}

// theory
if(q.includes("bodmas")){
return `
BODMAS Rule:<br>
B → Brackets<br>
O → Orders<br>
D → Division<br>
M → Multiplication<br>
A → Addition<br>
S → Subtraction<br><br>

Example:<br>
2 + 3 × 4 = 14
`
}

return "Ask math like: 2+2 or 5+3×2 or what is bodmas"
}
}

// theory
if(q.includes("bodmas")){
return `
BODMAS Rule:
B → Brackets  
O → Orders (powers)  
D → Division  
M → Multiplication  
A → Addition  
S → Subtraction  

Example:
2 + 3 × 4 = 14  
(not 20)

Because multiply first.
`
}

return "Ask math like: 2+2 or 5+3*2 or what is bodmas"
}

function quiz(){
let out=document.getElementById('output')
out.style.display='block'
out.innerHTML=`
BODMAS Quiz:<br><br>
1) 2 + 3 × 4 = ?<br>
2) 10 − 2 × 3 = ?<br>
3) 8 ÷ 2 + 2 = ?<br>
`
}

function startVoice(){
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = 'en-IN';

recognition.onresult = function(event){
document.getElementById('question').value =
event.results[0][0].transcript;
}

recognition.start();
}
</script>

</body>
</html>
