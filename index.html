<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BharatStudyAI</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4F9CF9,#6BCB77);
margin:0;
padding:0;
}

.header{
text-align:center;
padding:20px;
background:white;
border-bottom:4px solid #FFD93D;
}

.logo{font-size:30px;font-weight:bold}
.tag{color:#666}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.subjects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:20px;
}

.subject{
background:#f5f7ff;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#4F9CF9;
color:white;
cursor:pointer;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.answer{
margin-top:20px;
padding:15px;
background:#f0fff4;
border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🤖 BharatStudyAI</div>
<div class="tag">Learn Smart for Class 1–5</div>
</div>

<div class="container">
<div class="card">

<div class="subjects">
<div class="subject">📘 Math</div>
<div class="subject" onclick="showEnglish()">📖 English</div>
<div class="subject">📝 Hindi</div>
<div class="subject">🌍 World</div>
<div class="subject">🏃 Khel</div>
<div class="subject">🎨 Arts</div>
</div>

<div id="chapters"></div>
<div id="chapterContent" class="answer" style="display:none"></div>

</div>
</div>

<script>

function showEnglish(){

document.getElementById("chapterContent").style.display="none"

document.getElementById("chapters").innerHTML=`

<h3>Class 4 English (Santoor)</h3>

<button onclick="openChapter(1)">1. Together We Can</button>
<button onclick="openChapter(2)">2. The Tinkling Bells</button>
<button onclick="openChapter(3)">3. Be Smart, Be Safe</button>
<button onclick="openChapter(4)">4. One Thing at a Time</button>
<button onclick="openChapter(5)">5. The Old Stag</button>
<button onclick="openChapter(6)">6. Braille</button>
<button onclick="openChapter(7)">7. Fit Body Fit Mind</button>
<button onclick="openChapter(8)">8. Lagori Champions</button>
<button onclick="openChapter(9)">9. Hekko</button>
<button onclick="openChapter(10)">10. The Swing</button>
<button onclick="openChapter(11)">11. Magical Mountains</button>
<button onclick="openChapter(12)">12. Maheshwar</button>

`
}


function openChapter(num){

document.getElementById("chapters").innerHTML=""

let content = document.getElementById("chapterContent")
content.style.display="block"

let title=[
"",
"Together We Can",
"The Tinkling Bells",
"Be Smart Be Safe",
"One Thing at a Time",
"The Old Stag",
"Braille",
"Fit Body Fit Mind",
"Lagori Champions",
"Hekko",
"The Swing",
"Magical Mountains",
"Maheshwar"
]

content.innerHTML=`

<h2>Chapter ${num} — ${title[num]}</h2>

<div class="buttons">

<button onclick="voiceRead()">🔊 Listen</button>
<button onclick="speakQuestion()">🎤 Speak</button>
<button onclick="askAI(${num})">🤖 Ask AI</button>

<button onclick="summary(${num})">🧠 Summary</button>
<button onclick="explain(${num})">📘 Explain</button>
<button onclick="keywords(${num})">🔑 Keywords</button>
<button onclick="qa(${num})">❓ Q&A</button>
<button onclick="quiz(${num})">📝 Quiz</button>

</div>

<textarea id="aiQuestion" placeholder="Ask about this chapter..." 
style="width:100%;margin-top:10px;padding:10px;border-radius:8px"></textarea>

<div id="aiOutput" style="margin-top:15px"></div>

<div class="buttons">
<button onclick="showEnglish()">⬅ Back</button>
<button onclick="prevChapter(${num})">⬅ Previous</button>
<button onclick="nextChapter(${num})">Next ➡</button>
</div>

`
}


function prevChapter(n){
if(n>1) openChapter(n-1)
}

function nextChapter(n){
if(n<12) openChapter(n+1)
}


function voiceRead(){
let text=document.getElementById("chapterContent").innerText
let speech=new SpeechSynthesisUtterance(text)
speech.lang="en-IN"
speechSynthesis.speak(speech)
}


function speakQuestion(){
const recognition =
new (window.SpeechRecognition || window.webkitSpeechRecognition)()

recognition.lang="en-IN"

recognition.onresult=function(e){
document.getElementById("aiQuestion").value =
e.results[0][0].transcript
}

recognition.start()
}


function askAI(n){
let q=document.getElementById("aiQuestion").value
document.getElementById("aiOutput").innerHTML=
"AI Answer for chapter "+n+": "+q
}


function summary(n){
document.getElementById("aiOutput").innerHTML=
"Summary of chapter "+n
}

function explain(n){
document.getElementById("aiOutput").innerHTML=
"Explanation of chapter "+n
}

function keywords(n){
document.getElementById("aiOutput").innerHTML=
"Keywords of chapter "+n
}

function qa(n){
document.getElementById("aiOutput").innerHTML=
"Questions & Answers of chapter "+n
}

function quiz(n){
document.getElementById("aiOutput").innerHTML=
"Quiz of chapter "+n
}

</script>

</body>
</html>
