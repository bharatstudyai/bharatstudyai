<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BharatStudyAI</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4F9CF9,#6BCB77);
margin:0;
padding:0;
color:#333;
}

.header{
text-align:center;
padding:20px;
background:white;
border-bottom:4px solid #FFD93D;
}

.logo{
font-size:32px;
font-weight:bold;
}

.tag{
color:#666;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:2px solid #eee;
font-size:16px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.ask{background:#4F9CF9;color:white}
.quiz{background:#FFD93D}
.voice{background:#6BCB77;color:white}

.subjects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:20px;
}

.subject{
background:#f5f7ff;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.answer{
margin-top:20px;
padding:15px;
background:#f0fff4;
border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🤖 BharatStudyAI</div>
<div class="tag">Learn Smart for Class 1–5</div>
</div>

<div class="container">
<div class="card">

<select id="class">
<option>Class 1</option>
<option>Class 2</option>
<option>Class 3</option>
<option>Class 4</option>
<option>Class 5</option>
</select>

<select id="subject">
<option>Math</option>
<option>English</option>
<option>Hindi</option>
<option>The World Around Us</option>
<option>Khel & Yoga</option>
<option>Arts</option>
</select>

<select id="lang">
<option>English</option>
<option>Hindi</option>
</select>

<select id="chapter">
<option>Select Chapter</option>
</select>

<div class="buttons">
<button onclick="showSummary()">Summary</button>
<button onclick="showKeywords()">Keywords</button>
<button onclick="showExplain()">Explanation</button>
<button onclick="showQA()">Q&A</button>
</div>
  
<textarea id="question" placeholder="Ask your question..."></textarea>

<div class="buttons">
<button class="voice" onclick="startVoice()">🎤 Speak</button>
<button class="ask" onclick="askAI()">Submit</button>
<button class="quiz" onclick="quiz()">Generate Quiz</button>
</div>

<div id="output" class="answer" style="display:none"></div>

<div class="subjects">
<div class="subject">📘 Math</div>
<div class="subject">📖 English</div>
<div class="subject">📝 Hindi</div>
<div class="subject">🌍 World</div>
<div class="subject">🏃 Khel</div>
<div class="subject">🎨 Arts</div>
</div>

</div>
</div>

<script>
document.getElementById("subject").addEventListener("change", function(){

let subject=this.value
let chapter=document.getElementById("chapter")

if(subject=="English"){
chapter.innerHTML=`

<option>Select Chapter</option>

<option>Together We Can</option>
<option>The Tinkling Bells</option>
<option>Be Smart, Be Safe</option>

<option>One Thing at a Time</option>
<option>The Old Stag</option>
<option>Braille</option>

<option>Fit Body, Fit Mind, Fit Nation</option>
<option>The Lagori Champions</option>
<option>Hekko</option>

<option>The Swing</option>
<option>A Journey to the Magical Mountains</option>
<option>Maheshwar</option>

`
}

})
  
function askAI(){
let q=document.getElementById('question').value.toLowerCase()
let out=document.getElementById('output')

out.style.display='block'
out.innerHTML = solveAI(q)
}

function solveAI(q){

// convert symbols
q=q.replace(/×/g,'*')
q=q.replace(/÷/g,'/')
q=q.replace(/x/g,'*')

/* ----------- BODMAS ----------- */

if(q.includes('+')||q.includes('-')||q.includes('*')||q.includes('/')){
try{
let result = Function('"use strict"; return ('+q+')')()
return "Answer: "+result+"<br><br>BODMAS applied"
}catch{
return "Enter valid math question"
}
}

if(q.includes("bodmas")){
return "BODMAS = Brackets, Orders, Division, Multiplication, Addition, Subtraction"
}

/* ----------- CLASS 4 ENGLISH ----------- */

if(q.includes("wake up")){
return "Wake Up: Wake up, wake up! It's a lovely day. Birds are singing."
}

if(q.includes("neha")){
return "Neha's Alarm Clock: Neha doesn't like waking early. Birds wake her."
}

if(q.includes("noses")){
return "Noses: Some noses are big. Some are small. Noses help us smell."
}

if(q.includes("fir tree")){
return "Little Fir Tree: Tree wanted new leaves. Learned original leaves best."
}

if(q.includes("run")){
return "Run: Run in the sun, run in the rain."
}

if(q.includes("nasruddin")){
return "Nasruddin's Aim: Funny story about arrows."
}

if(q.includes("old english book")){
return "Chapters: Wake Up, Neha Alarm Clock, Noses, Little Fir Tree, Run, Nasruddin"
}
  
/* ===============================
CLASS 4 SANTOOR FULL CONTENT
================================*/

/* CH 1 — TOGETHER WE CAN */

return "Together We Can: Children learn teamwork. Helping each other makes work easy."
}

if(q.includes("together we can keywords")){
return "Together: work with others | Teamwork: group work | Share: give part | Help: assist | Cooperate: work peacefully"
}

if(q.includes("together we can explanation")){
return "This chapter teaches unity. When we work together, we succeed. Helping friends builds friendship."
}

if(q.includes("together we can questions")){
return "Q: What do children learn? A: Teamwork. Q: Why teamwork? A: Work becomes easy."
}

if(q.includes("together we can")){
return "Chapter 1 Together We Can — ask summary / keywords / explanation / questions"
}

return "Try: 2+2 or wake up or neha or bodmas"

function quiz(){
let out=document.getElementById('output')
out.style.display='block'
out.innerHTML="Quiz:<br>1)2+3×4=?<br>2)Who is Neha?<br>3)What do noses do?"
}

function startVoice(){
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang='en-IN';

recognition.onresult=function(e){
document.getElementById('question').value=e.results[0][0].transcript;
}

recognition.start();
}
</script>

</html>
