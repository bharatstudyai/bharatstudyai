<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BharatStudyAI</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4F9CF9,#6BCB77);
margin:0;
padding:0;
color:#333;
}

.header{
text-align:center;
padding:20px;
background:white;
border-bottom:4px solid #FFD93D;
}

.logo{
font-size:32px;
font-weight:bold;
}

.tag{
color:#666;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:2px solid #eee;
font-size:16px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.ask{background:#4F9CF9;color:white}
.quiz{background:#FFD93D}
.voice{background:#6BCB77;color:white}

.subjects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:20px;
}

.subject{
background:#f5f7ff;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.answer{
margin-top:20px;
padding:15px;
background:#f0fff4;
border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🤖 BharatStudyAI</div>
<div class="tag">Learn Smart for Class 1–5</div>
</div>

<div class="container">
<div class="card">

<select id="class">
<option>Class 1</option>
<option>Class 2</option>
<option>Class 3</option>
<option>Class 4</option>
<option>Class 5</option>
</select>

<select id="subject">
<option>Math</option>
<option>English</option>
<option>Hindi</option>
<option>The World Around Us</option>
<option>Khel & Yoga</option>
<option>Arts</option>
</select>

<select id="lang">
<option>English</option>
<option>Hindi</option>
</select>

<textarea id="question" placeholder="Ask your question..."></textarea>

<div id="output" class="answer" style="display:none"></div>

<div class="subjects">
<div class="subject">📘 Math</div>
<div class="subject" onclick="showEnglish()">📖 English</div>
<div class="subject">📝 Hindi</div>
<div class="subject">🌍 World</div>
<div class="subject">🏃 Khel</div>
<div class="subject">🎨 Arts</div>
</div>

<div id="chapters" style="margin-top:20px;"></div>
<div id="chapterContent" class="answer" style="display:none"></div>

</div>
</div>

<script>

function showEnglish(){
document.getElementById("chapters").innerHTML=`

<h3>Class 4 English (Santoor)</h3>

<button onclick="openChapter(1)">1. Together We Can</button>
<button onclick="openChapter(2)">2. The Tinkling Bells</button>
<button onclick="openChapter(3)">3. Be Smart, Be Safe</button>
<button onclick="openChapter(4)">4. One Thing at a Time</button>
<button onclick="openChapter(5)">5. The Old Stag</button>
<button onclick="openChapter(6)">6. Braille</button>
<button onclick="openChapter(7)">7. Fit Body Fit Mind</button>
<button onclick="openChapter(8)">8. Lagori Champions</button>
<button onclick="openChapter(9)">9. Hekko</button>
<button onclick="openChapter(10)">10. The Swing</button>
<button onclick="openChapter(11)">11. Magical Mountains</button>
<button onclick="openChapter(12)">12. Maheshwar</button>

`
}

function openChapter(num){

let content = document.getElementById("chapterContent")
content.style.display="block"

let title=[
"",
"Together We Can",
"The Tinkling Bells",
"Be Smart Be Safe",
"One Thing at a Time",
"The Old Stag",
"Braille",
"Fit Body Fit Mind",
"Lagori Champions",
"Hekko",
"The Swing",
"Magical Mountains",
"Maheshwar"
]

content.innerHTML=`

<h2>Chapter ${num} — ${title[num]}</h2>

<div class="buttons">

<button onclick="voiceRead()">🔊 Read</button>
<button onclick="speakQuestion()">🎤 Speak</button>
<button onclick="askChapterAI(${num})">🤖 Ask AI</button>

<button onclick="aiExplain(${num})">📘 Explain</button>
<button onclick="aiSummary(${num})">🧠 Summary</button>
<button onclick="aiKeywords(${num})">🔑 Keywords</button>
<button onclick="aiQA(${num})">❓ Q&A</button>
<button onclick="aiQuiz(${num})">📝 Quiz</button>

</div>

<textarea id="aiQuestion" placeholder="Ask about this chapter..."></textarea>

<div id="aiContent" style="margin-top:15px"></div>

<div class="buttons">
<button onclick="showEnglish()">⬅ Back</button>
<button onclick="if(${num}>1) openChapter(${num-1})">⬅ Previous</button>
<button onclick="if(${num}<12) openChapter(${num+1})">Next ➡</button>
</div>

`
}

function voiceRead(){
let text=document.getElementById("chapterContent").innerText
let speech=new SpeechSynthesisUtterance(text)
speech.lang="en-IN"
speechSynthesis.speak(speech)
}

function speakQuestion(){
const recognition =
new(window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="en-IN"

recognition.onresult=function(e){
document.getElementById("aiQuestion").value =
e.results[0][0].transcript
}

recognition.start()
}

function askChapterAI(num){
let q=document.getElementById("aiQuestion").value.toLowerCase()
let out=document.getElementById("aiContent")

if(q.includes("summary")){ aiSummary(num); return }
if(q.includes("explain")){ aiExplain(num); return }
if(q.includes("question")){ aiQA(num); return }

out.innerHTML="Answer about chapter "+num+": "+q
}

function aiExplain(){
document.getElementById("aiContent").innerHTML=
"This chapter explains lesson and values."
}

function aiSummary(n){
document.getElementById("aiContent").innerHTML=
"Short summary of chapter "+n
}

function aiKeywords(){
document.getElementById("aiContent").innerHTML=
"Important • Learn • Story • Values"
}

function aiQA(){
document.getElementById("aiContent").innerHTML=
"Q1 What is lesson?<br>Ans Moral learning"
}

function aiQuiz(){
document.getElementById("aiContent").innerHTML=
"1 What is main idea?<br>2 What lesson?"
}

</script>

</body>
</html>
